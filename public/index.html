<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qonaq úı brondaý júıesi | Қонақ үй брондау жүйесі</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-hotel" style="margin-right: 15px;"></i>Қонақ үй брондау жүйесі</h1>
        </header>

        <main>
            <section class="booking-form-section">
                <h2><i class="fas fa-plus-circle" style="margin-right: 10px; color: #059669;"></i>Жаңа брондау</h2>
                <form id="bookingForm">
                    <div class="form-group">
                        <label for="name"><i class="fas fa-user" style="margin-right: 8px;"></i>Аты-жөні:</label>
                        <input type="text" id="name" name="name" placeholder="Мысалы: Айдар Кәрімов" required>
                    </div>

                    <div class="form-group">
                        <label for="email"><i class="fas fa-envelope" style="margin-right: 8px;"></i>Email:</label>
                        <input type="email" id="email" name="email" placeholder="aidar@example.com" required>
                    </div>

                    <div class="form-group">
                        <label for="phone"><i class="fas fa-phone" style="margin-right: 8px;"></i>Телефон:</label>
                        <input type="tel" id="phone" name="phone" placeholder="+7 (700) 123-45-67" required>
                    </div>

                    <div class="form-group">
                        <label for="roomType"><i class="fas fa-bed" style="margin-right: 8px;"></i>Бөлме түрі:</label>
                        <select id="roomType" name="roomType" required>
                            <option value="" disabled selected>Бөлме түрін таңдаңыз</option>
                            <option value="standard">🏨 Стандарт (2 адам)</option>
                            <option value="lux">⭐ Люкс (2-3 адам)</option>
                            <option value="family">👨‍👩‍👧‍👦 Отбасылық (4-6 адам)</option>
                        </select>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="checkIn"><i class="fas fa-calendar-check" style="margin-right: 8px;"></i>Кіру күні:</label>
                            <input type="date" id="checkIn" name="checkIn" required>
                        </div>

                        <div class="form-group">
                            <label for="checkOut"><i class="fas fa-calendar-times" style="margin-right: 8px;"></i>Шығу күні:</label>
                            <input type="date" id="checkOut" name="checkOut" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="guests"><i class="fas fa-users" style="margin-right: 8px;"></i>Қонақтар саны:</label>
                        <input type="number" id="guests" name="guests" min="1" max="6" value="2" required>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-primary">
                            <i class="fas fa-check-circle" style="margin-right: 8px;"></i>Брондау
                        </button>
                        <button type="button" id="clearFormBtn" class="btn-secondary">
                            <i class="fas fa-eraser" style="margin-right: 8px;"></i>Тазалау
                        </button>
                    </div>
                </form>
            </section>

            <section class="bookings-list-section">
                <h2><i class="fas fa-list" style="margin-right: 10px; color: #1e2b3a;"></i>Брондаулар тізімі</h2>
                <div id="stats" class="stats">
                    <!-- Статистика осында көрсетіледі -->
                </div>
                <div id="bookingsList" class="bookings-list">
                    <!-- Брондаулар осында көрсетіледі -->
                </div>
            </section>
        </main>
    </div>

    <div id="message" class="message" style="display: none;"></div>
    <script src="/script.js"></script>
</body>
</html>
